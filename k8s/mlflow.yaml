apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: argo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:15
          command:
            - sh
            - -c
            - until pg_isready -h postgres -U mlflow; do sleep 2; done
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v2.13.0
          command:
            - sh
            - -c
            - |
              pip install --quiet psycopg2-binary &&
              mlflow server \
                --backend-store-uri postgresql://mlflow:$POSTGRES_PASSWORD@postgres:5432/mlflow \
                --default-artifact-root s3://mlflow-artifacts/ \
                --host 0.0.0.0 \
                --port 5000
          ports:
            - containerPort: 5000
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "500m"
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mlflow-postgres
                  key: password
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: mlflow-minio
                  key: access-key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: mlflow-minio
                  key: secret-key
            - name: MLFLOW_S3_ENDPOINT_URL
              value: http://minio:9000
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: argo
spec:
  selector:
    app: mlflow
  ports:
    - port: 5000
      targetPort: 5000
