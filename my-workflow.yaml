apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: ml-workflow-
  namespace: argo
spec:
  entrypoint: ml-pipeline
  onExit: exit-handler

  # Auto-created PVC shared across all steps, mounted at /mnt/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 100Mi

  templates:
    - name: ml-pipeline
      dag:
        tasks:
          - name: download-data
            template: download-data

          - name: preprocess
            template: preprocess
            dependencies: [download-data]

          - name: train
            template: train
            dependencies: [preprocess]

          - name: validate
            template: validate
            dependencies: [train]

          - name: register
            template: register
            dependencies: [validate]
            when: "{{tasks.validate.outputs.parameters.accuracy}} > 0.9"
            arguments:
              parameters:
                - name: accuracy
                  value: "{{tasks.validate.outputs.parameters.accuracy}}"

    - name: download-data
      script:
        image: python:3.11-slim
        command: [python]
        source: |
          import subprocess
          subprocess.run(["pip", "install", "-q", "scikit-learn", "pandas"], check=True)

          from sklearn.datasets import load_iris
          import pandas as pd

          iris = load_iris()
          df = pd.DataFrame(iris.data, columns=iris.feature_names)
          df['target'] = iris.target
          df.to_csv('/mnt/data/iris.csv', index=False)
          print(f"Saved {len(df)} rows to /mnt/data/iris.csv")
        volumeMounts:
          - name: data
            mountPath: /mnt/data

    - name: preprocess
      script:
        image: python:3.11-slim
        command: [python]
        source: |
          import subprocess
          subprocess.run(["pip", "install", "-q", "scikit-learn", "pandas"], check=True)

          import pandas as pd
          from sklearn.model_selection import train_test_split

          df = pd.read_csv('/mnt/data/iris.csv')
          df = df.dropna()
          print(f"Loaded {len(df)} rows, {df.isnull().sum().sum()} nulls dropped")

          train, test = train_test_split(df, test_size=0.2, random_state=42)
          train.to_csv('/mnt/data/train.csv', index=False)
          test.to_csv('/mnt/data/test.csv', index=False)
          print(f"Train: {len(train)} rows | Test: {len(test)} rows")
        volumeMounts:
          - name: data
            mountPath: /mnt/data

    - name: train
      script:
        image: python:3.11-slim
        command: [python]
        source: |
          import subprocess
          subprocess.run(["pip", "install", "-q", "scikit-learn", "pandas"], check=True)

          import pandas as pd
          import pickle
          from sklearn.ensemble import RandomForestClassifier

          train_df = pd.read_csv('/mnt/data/train.csv')
          X_train = train_df.drop('target', axis=1)
          y_train = train_df['target']

          model = RandomForestClassifier(n_estimators=100, random_state=42)
          model.fit(X_train, y_train)

          with open('/mnt/data/model.pkl', 'wb') as f:
              pickle.dump(model, f)
          print("Model saved to /mnt/data/model.pkl")
        volumeMounts:
          - name: data
            mountPath: /mnt/data

    - name: validate
      script:
        image: python:3.11-slim
        command: [python]
        source: |
          import subprocess
          subprocess.run(["pip", "install", "-q", "scikit-learn", "pandas"], check=True)

          import pandas as pd
          import pickle
          from sklearn.metrics import accuracy_score

          test_df = pd.read_csv('/mnt/data/test.csv')
          X_test = test_df.drop('target', axis=1)
          y_test = test_df['target']

          with open('/mnt/data/model.pkl', 'rb') as f:
              model = pickle.load(f)

          accuracy = accuracy_score(y_test, model.predict(X_test))
          print(f"Validation accuracy: {accuracy:.4f}")

          with open('/tmp/accuracy.txt', 'w') as f:
              f.write(str(round(accuracy, 4)))
        volumeMounts:
          - name: data
            mountPath: /mnt/data
      outputs:
        parameters:
          - name: accuracy
            valueFrom:
              path: /tmp/accuracy.txt

    - name: register
      inputs:
        parameters:
          - name: accuracy
      container:
        image: alpine:3.18
        command: [sh, -c]
        args: ["echo 'Model registered: accuracy={{inputs.parameters.accuracy}}'"]

    - name: exit-handler
      container:
        image: alpine:3.18
        command: [sh, -c]
        args: ["echo 'Pipeline complete: status={{workflow.status}}'"]
